<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学生评语录入 — 华联中学评语系统</title>
  <link rel="stylesheet" href="css/pico.min.css">
  <style>
    /* ── 品牌色 ── */
    :root {
      --pico-primary: #1a56db;
      --pico-primary-background: #1a56db;
      --pico-primary-hover: #1e40af;
      --pico-primary-hover-background: #1e40af;
    }

    /* ── 顶部栏 ── */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 1rem;
      padding: 0.5rem 0;
    }
    .top-bar h1 { margin: 0; font-size: 1.5rem; }

    /* ── 科目选项卡 ── */
    .subject-tabs {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 1.5rem;
    }
    .subject-tab {
      padding: 0.5rem 1rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      cursor: pointer;
      font-size: 0.9rem;
      background: var(--pico-background-color);
      transition: all 0.2s;
      user-select: none;
    }
    .subject-tab:hover {
      border-color: var(--pico-primary);
      background: var(--pico-primary-hover);
      color: #fff;
    }
    .subject-tab.active {
      background: var(--pico-primary-background);
      color: #fff;
      border-color: var(--pico-primary-background);
      font-weight: 600;
    }

    /* ── 进度条 ── */
    .progress-wrap {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .progress-wrap progress {
      flex: 1; height: 14px;
    }
    .progress-label {
      font-weight: 700; white-space: nowrap; min-width: 4rem; text-align: center;
      font-size: 0.95rem;
    }

    /* ── 照片 ── */
    .student-photo {
      width: 60px; height: 80px;
      object-fit: cover;
      border-radius: var(--pico-border-radius);
      border: 1px solid var(--pico-muted-border-color);
    }
    .no-photo {
      width: 60px; height: 80px;
      background: var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--pico-muted-color); text-align: center;
      padding: 4px;
    }

    /* ── 完成行 ── */
    tr.row-complete td { opacity: 0.55; }
    tr.row-complete textarea {
      border-color: #86efac; background: #f0fdf4;
    }

    /* ── 自动保存指示 ── */
    .save-indicator {
      font-size: 0.85rem; color: var(--pico-muted-color);
      display: flex; align-items: center; gap: 0.35rem;
    }
    .save-indicator.saved { color: #16a34a; }
    .save-indicator.saving { color: #d97706; }

    /* ── 组标记 ── */
    .group-badge {
      display: inline-block; padding: 1px 8px; border-radius: 99px;
      font-size: 0.75rem; font-weight: 700;
    }
    .group-badge.A { background: #dbeafe; color: #1e40af; }
    .group-badge.B { background: #ede9fe; color: #6b21a8; }
  </style>
</head>
<body>
  <main class="container-fluid" style="padding: 1rem 2rem;">

    <!-- ═══ 顶部 ═══ -->
    <div class="top-bar">
      <div>
        <h1>📝 <span id="pageTitle">学生评语录入</span></h1>
        <small style="color:var(--pico-muted-color);">
          你好，<strong id="teacherName">...</strong> — <span id="teacherRole"></span>
        </small>
      </div>
      <div style="display:flex; gap:0.5rem; align-items:center;">
        <span class="save-indicator" id="saveStatus">
          <span id="saveIcon">✅</span> <span id="saveText">已保存</span>
        </span>
        <button class="secondary outline" onclick="logout()">🚪 登出</button>
      </div>
    </div>

    <hr>

    <!-- ═══ 科目选项卡 ═══ -->
    <div class="subject-tabs" id="subjectTabs"></div>

    <!-- ═══ 进度条 ═══ -->
    <div class="progress-wrap">
      <strong>进度:</strong>
      <progress id="progressBar" value="0" max="100"></progress>
      <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>

    <!-- ═══ 操作按钮 ═══ -->
    <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
      <button class="secondary outline" onclick="markCurrentComplete()">
        ✅ 标记全部完成
      </button>
    </div>

    <!-- ═══ 学生表格 ═══ -->
    <figure style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
      <table class="striped" id="studentTable">
        <thead>
          <tr>
            <th scope="col" style="width:45px;">No.</th>
            <th scope="col" style="width:65px;">照片</th>
            <th scope="col">学生姓名 / Nama Murid</th>
            <th scope="col" style="width:50px;">班</th>
            <th scope="col">评语 / Maklum Balas</th>
            <th scope="col" style="width:50px;">✅</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" style="text-align:center;">加载中...</td></tr>
        </tbody>
      </table>
    </figure>

    <!-- ═══ 底部导出 ═══ -->
    <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1.5rem;">
      <button class="secondary" onclick="exportCSV()">📥 导出 CSV</button>
    </div>

  </main>

  <script src="js/auth.js"></script>
  <script src="js/report-api.js"></script>
  <script>
    // ── 全局状态 ──
    let allData = null;           // { subjects: [...] }
    let activeSubjectIndex = 0;
    let saveTimers = {};          // studentId → timeoutId (debounce)

    // ── 初始化 ──
    (async function init() {
      const auth = await requireAuth();
      if (!auth) return;

      document.getElementById('teacherName').textContent = auth.teacher.display_name;
      document.getElementById('teacherRole').textContent =
        auth.teacher.role === 'form_teacher' ? '(班主任)' : `(${auth.subjects.length} 个科目)`;

      // 加载评语数据
      try {
        allData = await getMyReports();
        renderSubjectTabs();
        renderActiveSubject();
      } catch (err) {
        document.getElementById('tableBody').innerHTML =
          `<tr><td colspan="6" style="text-align:center;color:#dc2626;">加载失败: ${err.message}</td></tr>`;
      }
    })();

    // ── 科目选项卡 ──
    function renderSubjectTabs() {
      const container = document.getElementById('subjectTabs');
      container.innerHTML = allData.subjects.map((s, i) =>
        `<span class="subject-tab${i === activeSubjectIndex ? ' active' : ''}"
              onclick="switchSubject(${i})">
          ${s.subject.display_name}
          <small style="opacity:0.7;">${s.progress.completed}/${s.progress.total}</small>
        </span>`
      ).join('');
    }

    function switchSubject(i) {
      activeSubjectIndex = i;
      renderSubjectTabs();
      renderActiveSubject();
    }

    // ── 渲染当前科目表格 ──
    function renderActiveSubject() {
      const subj = allData.subjects[activeSubjectIndex];
      document.getElementById('pageTitle').textContent = subj.subject.display_name + ' — 评语录入';
      document.getElementById('progressBar').value = subj.progress.percentage;
      document.getElementById('progressLabel').textContent =
        `${subj.progress.completed} / ${subj.progress.total}`;

      const tbody = document.getElementById('tableBody');
      if (subj.students.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;">该科目暂无学生</td></tr>`;
        return;
      }

      tbody.innerHTML = subj.students.map((st, idx) => {
        const photoHtml = st.photo_url
          ? `<img src="photos/${st.photo_url}" class="student-photo" alt="${st.name}"
                onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex';">
             <div class="no-photo" style="display:none;">无照片</div>`
          : `<div class="no-photo">无照片</div>`;

        const isDone = !!st.is_complete;
        const rowClass = isDone ? 'row-complete' : '';

        return `<tr class="${rowClass}" id="row-${st.id}">
          <td>${idx + 1}</td>
          <td>${photoHtml}</td>
          <td><strong>${st.name}</strong></td>
          <td><span class="group-badge ${st.group_code}">${st.group_code}</span></td>
          <td>
            <textarea id="ta-${st.id}" data-student="${st.id}"
              data-subject="${subj.subject.code}"
              oninput="onInput(${st.id}, '${subj.subject.code}')"
              placeholder="输入评语... / Sila masukkan maklum balas...">${st.feedback || ''}</textarea>
          </td>
          <td><input type="checkbox" id="cb-${st.id}" ${isDone ? 'checked' : ''}
              onclick="toggleComplete(${st.id}, '${subj.subject.code}', this.checked)" title="标记完成"></td>
        </tr>`;
      }).join('');
    }

    // ── 输入处理（debounce 2秒自动保存） ──
    function onInput(studentId, subjectCode) {
      const ta = document.getElementById('ta-' + studentId);
      const cb = document.getElementById('cb-' + studentId);
      const row = document.getElementById('row-' + studentId);
      const hasText = ta.value.trim().length > 0;

      // 自动勾选
      if (hasText && !cb.checked) cb.checked = true;
      if (!hasText && cb.checked) cb.checked = false;
      row.classList.toggle('row-complete', cb.checked);

      // Debounce 保存
      if (saveTimers[studentId]) clearTimeout(saveTimers[studentId]);
      saveTimers[studentId] = setTimeout(async () => {
        setSaveStatus('saving', '⏳', '保存中...');
        try {
          await saveReport(studentId, subjectCode, ta.value, cb.checked);
          setSaveStatus('saved', '✅', '已保存');
          // 更新本地数据
          const subj = allData.subjects[activeSubjectIndex];
          const st = subj.students.find(s => s.id === studentId);
          if (st) {
            st.feedback = ta.value;
            st.is_complete = cb.checked;
          }
          recalcProgress();
          renderSubjectTabs();
        } catch (err) {
          setSaveStatus('saved', '⚠️', '保存失败');
          console.error(err);
        }
      }, 2000);
    }

    function toggleComplete(studentId, subjectCode, checked) {
      const ta = document.getElementById('ta-' + studentId);
      const row = document.getElementById('row-' + studentId);
      row.classList.toggle('row-complete', checked);
      // 触发保存
      saveReport(studentId, subjectCode, ta.value, checked).catch(console.error);
      // 更新本地状态
      const subj = allData.subjects[activeSubjectIndex];
      const st = subj.students.find(s => s.id === studentId);
      if (st) st.is_complete = checked;
      recalcProgress();
      renderSubjectTabs();
    }

    function recalcProgress() {
      const subj = allData.subjects[activeSubjectIndex];
      const completed = subj.students.filter(s => s.is_complete).length;
      subj.progress.completed = completed;
      subj.progress.percentage = subj.progress.total > 0
        ? Math.round((completed / subj.progress.total) * 100) : 0;
      document.getElementById('progressBar').value = subj.progress.percentage;
      document.getElementById('progressLabel').textContent =
        `${completed} / ${subj.progress.total}`;
    }

    function setSaveStatus(cls, icon, text) {
      const el = document.getElementById('saveStatus');
      el.className = 'save-indicator ' + cls;
      document.getElementById('saveIcon').textContent = icon;
      document.getElementById('saveText').textContent = text;
    }

    // ── 标记全部完成 ──
    async function markCurrentComplete() {
      if (!confirm('确定将所有学生标记为完成？')) return;
      const subj = allData.subjects[activeSubjectIndex];
      try {
        await markSubjectComplete(subj.subject.code);
        subj.students.forEach(s => { s.is_complete = true; s.feedback = s.feedback || ''; });
        subj.progress.completed = subj.progress.total;
        subj.progress.percentage = 100;
        renderActiveSubject();
        renderSubjectTabs();
      } catch (err) {
        alert('操作失败: ' + err.message);
      }
    }

    // ── 导出 CSV ──
    function exportCSV() {
      const subj = allData.subjects[activeSubjectIndex];
      const rows = [['No.', '学生姓名', '分组', '评语', '状态']];
      subj.students.forEach((st, idx) => {
        rows.push([idx + 1, st.name, st.group_name, st.feedback, st.is_complete ? '完成' : '未完成']);
      });
      const csv = '﻿' + rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `评语_${subj.subject.display_name}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
